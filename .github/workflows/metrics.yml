name: GitHub Metrics

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build font CSS from committed woff2
        run: |
          B64=$(base64 -w 0 .github/firacode.woff2)
          printf 'METRICS_CSS<<ENDOFCSS\n@font-face{font-family:"Fira Code";font-weight:400 600;src:url("data:font/woff2;base64,%s")format("woff2")}svg,*{font-family:"Fira Code","SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace!important}\nENDOFCSS\n' "$B64" >> "$GITHUB_ENV"

      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          user: msachan562000
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          config_display: regular
          extras_css: ${{ env.METRICS_CSS }}

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%
          plugin_languages_indepth: yes
          plugin_languages_recent_days: 90

          plugin_notable: yes
          plugin_notable_from: organization
          plugin_notable_repositories: yes

          filename: github-metrics.svg
          output_action: commit
          committer_message: "📊 Update GitHub metrics [skip ci]"
